services:
  mongo:
    image: mongo:7
    container_name: gm-vocab-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    image: node:22-alpine
    container_name: gm-vocab-backend
    working_dir: /app
    depends_on:
      - mongo
    environment:
      NODE_ENV: development
      PORT: "3000"
      # Uses .env (not committed). Falls back to local compose Mongo.
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/gm-vocabulary}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - backend_node_modules:/app/node_modules
    command: >
      sh -lc "npm install && npx nodemon backend/server.js"

  frontend:
    image: node:22-alpine
    container_name: gm-vocab-frontend
    working_dir: /app
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "250"
      NG_CLI_ANALYTICS: "false"
    ports:
      - "4200:4200"
    volumes:
      - ./:/app
      - frontend_node_modules:/app/node_modules
    command: >
      sh -lc "npm install && npm run start"

volumes:
  mongo_data:
  backend_node_modules:
  frontend_node_modules:

